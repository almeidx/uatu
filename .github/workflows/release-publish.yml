name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Get Version
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          TAG="v$VERSION"
          echo "Version: $VERSION"
          echo "Tag: $TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
            install_musl: true
            verify_static: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            install_musl: false
            verify_static: false
          - target: aarch64-apple-darwin
            os: macos-15
            use_cross: false
            install_musl: false
            verify_static: false
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install musl tools
        if: ${{ matrix.install_musl }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Verify static linkage
        if: ${{ matrix.verify_static }}
        run: |
          file target/${{ matrix.target }}/release/uatu
          (ldd target/${{ matrix.target }}/release/uatu 2>&1 || true) | grep -Eq 'not a dynamic|statically linked'

      - name: Package artifact
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p dist
          archive="uatu-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -C target/${{ matrix.target }}/release -czf "dist/$archive" uatu
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: uatu-${{ matrix.target }}
          path: |
            dist/uatu-${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz
            dist/uatu-${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create Tag & Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.version.outputs.version }}"

          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "## [" ver "]") == 1) found=1
            }
            found { print }
          ' CHANGELOG.md > release_notes.txt

          if [ ! -s release_notes.txt ]; then
            echo "## [$VERSION]" > release_notes.txt
            echo "" >> release_notes.txt
            echo "Release $VERSION" >> release_notes.txt
          fi

          cat release_notes.txt

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 1
          fi

          args=(--verify-tag --title "$TAG" --notes-file release_notes.txt)
          if [[ "$VERSION" == *-* ]]; then
            args+=(--prerelease)
          fi

          gh release create "$TAG" "${assets[@]}" "${args[@]}"
