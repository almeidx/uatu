name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_tag:
        description: Pre-release tag to use when bump is prerelease.
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - rc

concurrency:
  group: release-prepare
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Calculate new version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ inputs.bump }}"
          PRERELEASE_TAG="${{ inputs.prerelease_tag }}"

          CURRENT_BASE="${CURRENT%%-*}"
          CURRENT_PRERELEASE="${CURRENT#*-}"
          if [ "$CURRENT_PRERELEASE" = "$CURRENT" ]; then
            CURRENT_PRERELEASE=""
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_BASE"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            patch)
              PATCH=$((PATCH + 1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            prerelease)
              if [ -z "$CURRENT_PRERELEASE" ]; then
                PATCH=$((PATCH + 1))
                NEXT_NUMBER=1
              else
                CURRENT_TAG="${CURRENT_PRERELEASE%%.*}"
                CURRENT_NUMBER="${CURRENT_PRERELEASE#*.}"
                if [ "$CURRENT_NUMBER" = "$CURRENT_PRERELEASE" ]; then
                  CURRENT_TAG=$(printf '%s' "$CURRENT_PRERELEASE" | sed -E 's/[0-9]+$//')
                  CURRENT_NUMBER=$(printf '%s' "$CURRENT_PRERELEASE" | sed -E 's/^.*[^0-9]([0-9]+)$/\1/')
                fi

                if [ "$CURRENT_TAG" = "$PRERELEASE_TAG" ] && printf '%s' "$CURRENT_NUMBER" | grep -Eq '^[0-9]+$'; then
                  NEXT_NUMBER=$((CURRENT_NUMBER + 1))
                else
                  NEXT_NUMBER=1
                fi
              fi
              NEW_VERSION="$MAJOR.$MINOR.$PATCH-$PRERELEASE_TAG.$NEXT_NUMBER"
              ;;
          esac

          TAG="v$NEW_VERSION"
          BRANCH="release/$TAG"

          echo "New version: $NEW_VERSION"
          echo "Tag: $TAG"
          echo "Branch: $BRANCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Generate changelog section
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          TODAY=$(date +%Y-%m-%d)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Generating changelog from $PREVIOUS_TAG to HEAD"
            COMMITS=$(git log --pretty=format:"- %s" "$PREVIOUS_TAG"..HEAD --no-merges | grep -v "^- chore: release" || true)
          else
            echo "No previous tag found, generating full changelog"
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          fi

          {
            echo "## [$VERSION] - $TODAY"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- Initial release"
            fi
            echo ""
          } > new_section.txt

          cat new_section.txt

      - name: Update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            head -n 4 CHANGELOG.md > CHANGELOG.new.md
            echo "" >> CHANGELOG.new.md
            cat new_section.txt >> CHANGELOG.new.md
            tail -n +5 CHANGELOG.md >> CHANGELOG.new.md
            mv CHANGELOG.new.md CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              cat new_section.txt
            } > CHANGELOG.md
          fi

          rm new_section.txt
          cat CHANGELOG.md

      - name: Update Cargo.toml version
        run: |
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" Cargo.toml
          echo "Updated Cargo.toml to version $NEW_VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        run: cargo update -p uatu --precise "${{ steps.bump.outputs.version }}"

      - name: Create release branch and push
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          BRANCH="${{ steps.bump.outputs.branch }}"

          git checkout -B "$BRANCH"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: release $TAG"
          git push --force-with-lease origin "$BRANCH"

      - name: Ensure release label
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh label create release --description "Release preparation" --color 0E8A16 --force

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          gh pr create \
            --title "Release $TAG" \
            --body "## Release $TAG

          This PR prepares the release of version $VERSION.

          ### Changes
          - Updated Cargo.toml to $VERSION
          - Updated Cargo.lock for $VERSION
          - Updated CHANGELOG.md with changes since the previous tag

          ### After Merge
          When this PR is merged, the release workflow will tag the merge commit, build static Linux artifacts, and create the GitHub Release." \
            --label release \
            --base main
