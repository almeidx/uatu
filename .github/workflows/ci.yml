# CI (SPEC §13, §14): Linux-only checks and static musl release-target
# builds. Release publishing is handled by release-publish.yml.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-x64
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-x64
          cache-on-failure: true

      - name: Unit + integration + reporter tests
        run: cargo test

  musl-build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install musl tools
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build (release, fully static)
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Verify static linkage
        if: ${{ !matrix.use_cross }}
        run: |
          file target/${{ matrix.target }}/release/uatu
          (ldd target/${{ matrix.target }}/release/uatu 2>&1 || true) | grep -Eq 'not a dynamic|statically linked'

      - name: Package artifact
        run: |
          mkdir -p dist
          archive="uatu-${{ matrix.target }}.tar.gz"
          tar -C target/${{ matrix.target }}/release -czf "dist/$archive" uatu
          cd dist
          sha256sum "$archive" > "$archive.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: uatu-${{ matrix.target }}
          path: |
            dist/uatu-${{ matrix.target }}.tar.gz
            dist/uatu-${{ matrix.target }}.tar.gz.sha256
