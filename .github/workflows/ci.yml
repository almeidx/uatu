# CI (SPEC §13, §14): Linux-only — unit tests, integration tests, and the
# static musl release targets. Release tags publish both musl binaries with
# SHA-256 checksums.

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit + integration + reporter tests
        run: cargo test

  musl-build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl tools
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked
      - name: Build (release, fully static)
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Verify static linkage
        if: ${{ !matrix.use_cross }}
        run: |
          file target/${{ matrix.target }}/release/uatu
          (ldd target/${{ matrix.target }}/release/uatu 2>&1 || true) | grep -Eq 'not a dynamic|statically linked'
      - name: Package artifact
        run: |
          cd target/${{ matrix.target }}/release
          tar czf uatu-${{ matrix.target }}.tar.gz uatu
          sha256sum uatu-${{ matrix.target }}.tar.gz > uatu-${{ matrix.target }}.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: uatu-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/uatu-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/uatu-${{ matrix.target }}.tar.gz.sha256

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, musl-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Publish release with checksums
        uses: softprops/action-gh-release@v2
        with:
          files: |
            uatu-*.tar.gz
            uatu-*.tar.gz.sha256
          generate_release_notes: true
